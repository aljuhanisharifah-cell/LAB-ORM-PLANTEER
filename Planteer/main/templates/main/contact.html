{% extends 'main/base.html' %}

{% block content %}

<h1 class="page-title">Contact Us 📩</h1>

<form method="POST" class="add-form">
    {% csrf_token %}

    {% if error %}
        <p style="color:red; text-align:center;">{{ error }}</p>
    {% endif %}

    <div class="form-group">
        <label>First Name</label>
        <input type="text" name="first_name" required minlength="2" placeholder="Enter your first name">
    </div>

    <div class="form-group">
        <label>Last Name</label>
        <input type="text" name="last_name" required minlength="2" placeholder="Enter your last name">
    </div>

    <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" required placeholder="example@email.com">
    </div>

    <div class="form-group">
        <label>Message</label>
        <textarea name="message" required minlength="5" placeholder="Write your message..."></textarea>
    </div>

    <button type="submit" class="btn">Send Message</button>

</form>

{% endblock %}
