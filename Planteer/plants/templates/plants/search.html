{% extends 'main/base.html' %}
{% load static %}

{% block content %}

<h1 class="page-title">Search Plants </h1>

<form method="GET" class="search-form">

    <input type="text" name="q" placeholder="Search plant...">

    <select name="category">
        <option value="">All Categories</option>
        <option value="Fruit">Fruit</option>
        <option value="Vegetable">Vegetable</option>
        <option value="Flower">Flower</option>
        <option value="Tree">Tree</option>
    </select>

    <select name="edible">
        <option value="">All</option>
        <option value="yes" {% if request.GET.edible == "yes" %}selected{% endif %}>Edible</option>
        <option value="no" {% if request.GET.edible == "no" %}selected{% endif %}>Not Edible</option>
    </select>

    <select name="country">
        <option value="">All Countries</option>
        {% for c in countries %}
            <option value="{{ c.id }}"
                {% if request.GET.country == c.id|stringformat:"s" %}selected{% endif %}>
                {{ c.name }}
            </option>
        {% endfor %}
    </select>

 
    <select name="publisher">
        <option value="">All Publishers</option>
        {% for p in publishers %}
            <option value="{{ p.id }}"
                {% if request.GET.publisher == p.id|stringformat:"s" %}selected{% endif %}>
                {{ p.name }}
            </option>
        {% endfor %}
    </select>

    <button type="submit">Search</button>

</form>

<div class="plants-grid">

    {% for plant in plants %}
        {% include 'plants/plant_card.html' %}
    {% empty %}
        <p style="text-align:center;">No results found 😢</p>
    {% endfor %}

</div>

{% endblock %}
